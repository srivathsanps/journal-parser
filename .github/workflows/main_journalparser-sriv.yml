name: Build and deploy Python app to Azure Web App - journalparser-sriv

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8FA8F4A49AC14D7E8A628F36B73BAFAE }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3BE6252710C14E409C6E488D116C6F4F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C5E0D4B306A34AA3BE4BB56ADE41A7DD }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: journalparser-sriv
          slot-name: Production

      # -----------------------------
      # TEAMS NOTIFICATION
      # -----------------------------

      - name: Notify Teams
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            MESSAGE="Production change triggered\nPayload injected across global nodes 🌐\nServer response → STABLE 🟢\nDeployment status → LIVE 🚀\nNode handshake confirmed 🤝 → DevOps Commander"
          else
            MESSAGE="❗ PRODUCTION CHANGE TRIGGERED ❗\nPayload injection attempted across global nodes 🛰️\nServer response → ROLLBACK INITIATED 🔁\nDeployment status → FAILED ❌❌❌\nNode handshake interrupted ⚠️"
          fi

          curl -H "Content-Type: application/json" \
          -d "{\"text\":\"$MESSAGE\"}" \
          ${{ secrets.TEAMS_WEBHOOK }}
