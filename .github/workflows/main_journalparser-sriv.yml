name: Build and deploy Python app to Azure Web App - journalparser-sriv

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8FA8F4A49AC14D7E8A628F36B73BAFAE }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3BE6252710C14E409C6E488D116C6F4F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C5E0D4B306A34AA3BE4BB56ADE41A7DD }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy
        with:
          app-name: journalparser-sriv
          slot-name: Production

      # --------------------------------
      # TEAMS SUCCESS MESSAGE
      # --------------------------------

      - name: Teams Notification Success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
          "text": "⚠️ PRODUCTION ENVIRONMENT CHANGES TRIGGERED ⚠️

Payload injected across global nodes 🛰️

Server response → STABLE 🟢🟢🟢🟢
Deployment status → LIVE 🟢🟢🟢🟢

Node handshake confirmed 🤝 → DevOps Commander"
          }' \
          ${{ secrets.TEAMS_WEBHOOK }}

      # --------------------------------
      # TEAMS FAILURE MESSAGE
      # --------------------------------

      - name: Teams Notification Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
          "text": "⚠️ PRODUCTION ENVIRONMENT CHANGES TRIGGERED ⚠️

Payload injection attempted across global nodes 🛰️

Server response → ROLLBACK INITIATED 🔁
Deployment status → FAILED 🔴🔴🔴🔴

Node handshake interrupted ⚠️"
          }' \
          ${{ secrets.TEAMS_WEBHOOK }}
